<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Countdown Matrimonio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="countdown">
    <h1>Countdown al Matrimonio</h1>
    <p id="timer"></p>
  </div>
  <script>
    // Esempio semplice di countdown
    const targetDate = new Date("June 4, 2026 16:00:00").getTime();
    const timerEl = document.getElementById("timer");
    function updateTimer() {
      const now = new Date().getTime();
      const distance = targetDate - now;
      if (distance < 0) {
        timerEl.textContent = "È arrivato il grande giorno!";
        return;
      }
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((distance % (1000 * 60)) / 1000);
      timerEl.textContent = `${days} gg ${hours} hh ${mins} mm ${secs} ss`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
</body>
</html>
