<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Countdown Evento</title>

<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Kaushan Script', cursive;
  background:black;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:red;
  text-align:center;
  padding:16px;
}

/* CONTENITORE */
.central-container{
  position:relative;
  width:100%;
  max-width:360px;
  height:480px;
}

/* SEZIONI (stages) */
.stage{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  transition:opacity .8s ease;
}

.stage.active{
  opacity:1;
  pointer-events:auto;
}

.stage-play{
  pointer-events:none;
}

.stage.inactive{
  opacity:0;
  pointer-events:none;
}

/* PLAY BUTTON */
#playBtn{
  font-family:'Kaushan Script', cursive;
  font-size:30px;
  padding:14px 28px;
  border-radius:20px;
  background:#a32f2f;
  color:white;
  border:none;
  cursor:pointer;
  animation:glowBtn 1.5s infinite alternate;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition: all 1s ease, background 0.8s ease;
}

#playBtn.moved{
  top:0%;
  left:85%;
  transform:translate(-50%,-50%) scale(0.9);
  background: rgba(163,47,47,0); /* solo sfondo trasparente */
}

/* GLOW BUTTON */
@keyframes glowBtn{
  from{ box-shadow:0 0 0px #a32f2f;}
  to{ box-shadow:0 0 10px #ff4c4c;}
}

/* FRASI */
.sequence{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

.sequence p{
  opacity:0;
  font-size:clamp(18px,4vw,26px);
  transition:opacity .6s ease;
}

#finalText{
  opacity:0;
  transition: opacity .6s ease;
  font-size: clamp(22px,5vw,30px);
}

.light{ color:#ffffff; }
.highlight{ color:red; }

/* COUNTDOWN */
#countdown{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:14px;
  transform: scale(1.4); /* più grande */
}

.box{
  width:80px;
  aspect-ratio:1/1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:18px;
  background:rgba(255,255,255,0.4);
}

.number{
  font-size:32px;
}

.label{
  font-size:14px;
}
</style>
</head>
<body>

<div class="central-container">

  <!-- STEP 1: PLAY -->
  <div class="stage stage-play active">
    <button id="playBtn">▶️</button>
  </div>

  <!-- STEP 2: ELENCO -->
  <div class="stage stage-sequence inactive">
    <div class="sequence" id="sequence">
      <p class="highlight">Ricordatevi di portare:</p>
      <p class="light">1. Il vostro sorriso migliore!</p>
      <p class="light">2. Un costume!</p>
      <p class="light">3. Tanta voglia di divertirvi!</p>
      <p class="highlight">4. Scarpe rosse e comode!</p>
    </div>
  </div>

  <!-- STEP 3: PERCHÉ MANCA SOLO -->
  <div class="stage stage-final inactive">
    <div class="sequence">
    <p id="finalText" class="highlight">...perché mancano solo...</p>
    </div>
  </div>

  <!-- STEP 4: COUNTDOWN -->
  <div class="stage stage-countdown inactive">
    <div id="countdown">
      <div class="box"><div class="number" id="days">0</div><div class="label">gg</div></div>
      <div class="box"><div class="number" id="hours">0</div><div class="label">hh</div></div>
      <div class="box"><div class="number" id="minutes">0</div><div class="label">mm</div></div>
      <div class="box"><div class="number" id="seconds">0</div><div class="label">ss</div></div>
    </div>
  </div>

</div>

<audio id="music" src="Are You Ready For This.mp3" loop></audio>

<script>
// DATA EVENTO
const target = new Date("2026-06-04T16:00:00").getTime();

// COUNTDOWN
function updateCountdown(){
  const diff = target - Date.now();
  if(diff <= 0) return;
  days.innerText = Math.floor(diff/86400000);
  hours.innerText = Math.floor(diff/3600000)%24;
  minutes.innerText = Math.floor(diff/60000)%60;
  seconds.innerText = Math.floor(diff/1000)%60;
}
setInterval(updateCountdown,1000);
updateCountdown();

// ELEMENTI STAGE
const stagePlay = document.querySelector(".stage-play");
const stageSequence = document.querySelector(".stage-sequence");
const stageFinal = document.querySelector(".stage-final");
const stageCountdown = document.querySelector(".stage-countdown");

// FRASI SEQUENZA
const lines = document.querySelectorAll(".stage-sequence p");
let index = 0;

const finalText = document.getElementById("finalText");

function showNextLine(){
  if(index < lines.length){
    lines[index].style.opacity = 1;
    index++;
    setTimeout(showNextLine, 2000);
  } else {

    // passa allo step 3
    stageSequence.classList.add("inactive");
    stageSequence.classList.remove("active");

    stageFinal.classList.add("active");
    stageFinal.classList.remove("inactive");

    // animazione comparsa frase
    setTimeout(()=>{
      finalText.style.opacity = 1;
    },200);

    // dopo 2 secondi mostra countdown
    setTimeout(()=>{
      stageFinal.classList.add("inactive");
      stageFinal.classList.remove("active");

      stageCountdown.classList.add("active");
      stageCountdown.classList.remove("inactive");
    },2200);
  }
}

// PLAY/PULSE BUTTON
const btn = document.getElementById("playBtn");
const music = document.getElementById("music");
let started=false;

btn.addEventListener("click", ()=>{
  if(!started){
    // Primo click: avvia musica e sequenza
    music.volume = 0;
    music.play();
    let v=0;
    const fade = setInterval(()=>{
      if(v < 0.5){
        v += 0.02;
        music.volume = v;
      } else clearInterval(fade);
    },80);

    /*stagePlay.classList.add("inactive");
    stagePlay.classList.remove("active");*/

    stageSequence.classList.add("active");
    stageSequence.classList.remove("inactive");

    setTimeout(showNextLine, 1000);

    started = true;

    // Sposta e rende lo sfondo trasparente
    btn.classList.add("moved");
    btn.innerText = "⏸️";

  } else {
    // toggle play/pause
    if(music.paused){
      music.play();
      btn.innerText = "⏸️";
    } else {
      music.pause();
      btn.innerText = "▶️";
    }
  }
});
</script>

</body>
</html>
