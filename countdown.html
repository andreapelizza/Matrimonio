<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Evento</title>

<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Kaushan Script', cursive;
  background:transparent;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start; /* testo più in alto */
  color:red;
  text-align:center;
  padding:20px;
}

/* HEADER */
header{
  position:relative;
  margin-bottom:20px;
  font-size:28px;
}

/* CONTENITORE CENTRALE */
.central-container{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start; /* testo più in alto */
  gap:18px;
  width:320px;
  max-width:90vw;
  min-height:400px; /* abbastanza spazio per testo + countdown */
  margin-top:40px;
}

/* PLAY */
#playBtn{
  font-family:'Kaushan Script', cursive;
  font-size:30px;
  padding:14px 28px;
  border-radius:20px;
  background:#a32f2f;
  color:white;
  border:none;
  cursor:pointer;
  animation:glowBtn 1.5s infinite alternate;
}

@keyframes glowBtn{
  from{ box-shadow:0 0 10px #a32f2f;}
  to{ box-shadow:0 0 25px #ff4c4c;}
}

/* FRASI */
.sequence{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  transition:opacity 1s ease;
}

.sequence p{
  opacity:0;
  font-size:clamp(18px, 4vw, 26px); /* ridotto da 22-32px a 18-26px */
}

.sequence .light{ color:#ffffff; }
.sequence .highlight{ color:red; }

/* COUNTDOWN 2x2 */
#countdown{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;

  position:absolute;       /* relativo al contenitore */
  top:10%;                   /* in cima al contenitore */
  left:50%;
  transform:translateX(-50%) scale(1.5); /* scala più grande */
  
  opacity:0;
  transition:all 1s cubic-bezier(.22,.61,.36,1);
  pointer-events:none;
}

:root{
  --countdown-scale: 1.4; /* aumentato da 1.5 → box più grandi */
}

/* quando sale in alto */
.countdown-top{
  opacity:1 !important;
  transform:translateX(-50%) scale(1.5);
}

.box{
  width: calc(70px * var(--countdown-scale)); /* puoi regolare la scala */
  aspect-ratio: 1 / 1;  /* mantiene il quadrato perfetto */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:18px;
  box-shadow:0 0 18px red;
  background: rgba(255, 255, 255, 0.4); /* bianco leggero e opaco */
  animation:glow 2s infinite alternate;
}

.number{
  font-size:calc(26px * var(--countdown-scale));
}

.label{
  font-size:calc(12px * var(--countdown-scale));
}

@keyframes glow{
  from{ box-shadow:0 0 10px red;}
  to{ box-shadow:0 0 25px red;}
}
</style>
</head>
<body>

<!--<header id="headerTitle">Siete Pront*?</header>-->

<div class="central-container">

<button id="playBtn">🎵 Play</button>

<div class="sequence" id="sequence">
  <p class="highlight">Ricordatevi di portare:</p>
  <p class="light">1. Il vostro sorriso migliore!</p>
  <p class="light">2. Un costume!</p>
  <p class="light">3. Tanta voglia di divertirvi!</p>
  <p class="highlight">4. Scarpe rosse e comode!</p>
  <p class="highlight">...perché mancano solo...</p>
</div>

<div id="countdown">
  <div class="box"><div class="number" id="days">0</div><div class="label">gg</div></div>
  <div class="box"><div class="number" id="hours">0</div><div class="label">hh</div></div>
  <div class="box"><div class="number" id="minutes">0</div><div class="label">mm</div></div>
  <div class="box"><div class="number" id="seconds">0</div><div class="label">ss</div></div>
</div>

</div>

<audio id="music" src="Are You Ready For This.mp3" loop></audio>

<script>
// DATA EVENTO
const target = new Date("2026-06-04T14:00:00Z").getTime();

// COUNTDOWN
function updateCountdown(){
  const diff = target - Date.now();
  if(diff <= 0) return;
  days.innerText = Math.floor(diff/86400000);
  hours.innerText = Math.floor(diff/3600000)%24;
  minutes.innerText = Math.floor(diff/60000)%60;
  seconds.innerText = Math.floor(diff/1000)%60;
}
setInterval(updateCountdown,1000);
updateCountdown();

// SEQUENZA FRASI
const lines = document.querySelectorAll(".sequence p");
const countdown = document.getElementById("countdown");
const music = document.getElementById("music");
let index = 0;

function showNextLine(){
  if(index < lines.length){
    lines[index].style.opacity = 1;
    index++;
    setTimeout(showNextLine, 2000);
  } else {

    // nasconde le frasi
document.querySelector('.sequence').style.transition = "opacity 0.8s ease";
const seq = document.querySelector('.sequence');
seq.style.transition = "opacity 0.8s ease";
seq.style.opacity = 0;

    // mostra countdown e lo sposta in alto
    countdown.style.opacity = 1;
    countdown.classList.add("countdown-top");
  }
}

// PLAY
const btn = document.getElementById("playBtn");
let started=false;

btn.addEventListener("click", ()=>{
  if(!started){
    music.volume = 0;
    music.play();

    let v=0;
    const fade = setInterval(()=>{
      if(v < 0.5){
        v += 0.02;
        music.volume = v;
      } else clearInterval(fade);
    },80);

    setTimeout(showNextLine, 1000);

    btn.style.display="none";
    started=true;
  }
});
</script>
</body>
</html>
